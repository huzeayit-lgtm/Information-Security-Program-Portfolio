<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <style>
    .box { fill: #ffffff; stroke: #0f172a; stroke-width: 1.5px; rx: 8px; }
    .title { font: 600 16px/1.1 system-ui, sans-serif; fill: #0f172a; }
    .sub { font: 400 13px/1 system-ui, sans-serif; fill: #334155; }
    .small { font: 400 12px/1 system-ui, sans-serif; fill: #475569; }
    .line { stroke: #0f172a; stroke-width: 1.2px; }
  </style>

  <!-- Top -->
  <rect class="box" x="380" y="10" width="240" height="44" rx="8"/>
  <text class="title" x="500" y="38" text-anchor="middle">Board</text>

  <!-- Second row -->
  <rect class="box" x="80" y="90" width="200" height="40" rx="8"/>
  <text class="sub" x="180" y="118" text-anchor="middle">Audit Committee</text>

  <rect class="box" x="360" y="90" width="280" height="40" rx="8"/>
  <text class="sub" x="500" y="118" text-anchor="middle">Executive Leadership</text>

  <rect class="box" x="680" y="90" width="200" height="40" rx="8"/>
  <text class="sub" x="780" y="118" text-anchor="middle">Security Steering Committee</text>

  <!-- Third row -->
  <rect class="box" x="360" y="170" width="280" height="40" rx="8"/>
  <text class="sub" x="500" y="198" text-anchor="middle">Security Compliance Manager</text>

  <!-- Connectors -->
  <line class="line" x1="500" y1="54" x2="180" y2="90" />
  <line class="line" x1="500" y1="54" x2="500" y2="90" />
  <line class="line" x1="500" y1="54" x2="820" y2="90" />
  <line class="line" x1="500" y1="130" x2="500" y2="170" />

  <!-- Bottom categories -->
  <g transform="translate(80,260)">
    <rect class="box" x="0" y="0" width="150" height="36" rx="8"/>
    <text class="small" x="75" y="24" text-anchor="middle">GRC</text>
    <rect class="box" x="180" y="0" width="150" height="36" rx="8"/>
    <text class="small" x="255" y="24" text-anchor="middle">Risk</text>
    <rect class="box" x="360" y="0" width="150" height="36" rx="8"/>
    <text class="small" x="435" y="24" text-anchor="middle">Vendor</text>
    <rect class="box" x="540" y="0" width="150" height="36" rx="8"/>
    <text class="small" x="615" y="24" text-anchor="middle">Privacy</text>
    <rect class="box" x="720" y="0" width="150" height="36" rx="8"/>
    <text class="small" x="795" y="24" text-anchor="middle">AI</text>
  </g>

  <!-- Lines from Security Compliance Manager to categories -->
  <line class="line" x1="500" y1="210" x2="155" y2="260" />
  <line class="line" x1="500" y1="210" x2="325" y2="260" />
  <line class="line" x1="500" y1="210" x2="505" y2="260" />
  <line class="line" x1="500" y1="210" x2="685" y2="260" />
  <line class="line" x1="500" y1="210" x2="860" y2="260" />

</svg>
